name: "Create Release Action"
description: "Infer the release version level from merged PR labels and create or update a GitHub release draft."
author: "OncoKB Team"
branding:
  icon: "tag"
  color: "blue"

inputs:
  github-token:
    description: "Token with contents:write access for creating or updating the release draft"
    required: true

  version-level:
    description: "Optional explicit release version level. Supported values are major, minor, and patch. Leave empty to infer from merged PR labels."
    required: false
    default: ""

  default-version-level:
    description: "Version level to use when no merged PR labels match"
    required: false
    default: "patch"

  target-branch:
    description: "Target branch or commitish for the release. Defaults to the repository default branch."
    required: false
    default: ""

  publish:
    description: "Whether to publish the release instead of leaving it as a draft"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Create or update release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        RELEASE_LABELS_CONFIG_PATH="$GITHUB_ACTION_PATH/release-labels.json"
        EXPLICIT_VERSION_LEVEL="${{ inputs.version-level }}"
        DEFAULT_VERSION_LEVEL="${{ inputs.default-version-level }}"
        TARGET_BRANCH="${{ inputs.target-branch }}"
        PUBLISH="${{ inputs.publish }}"

        if [[ ! -f "$RELEASE_LABELS_CONFIG_PATH" ]]; then
          echo "Shared release labels config not found." >&2
          exit 1
        fi

        normalize_label() {
          tr "[:upper:]" "[:lower:]" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'
        }

        label_matches() {
          local label="$1"
          local candidates="$2"
          while IFS= read -r candidate; do
            if [[ -n "$candidate" && "$label" == "$candidate" ]]; then
              return 0
            fi
          done <<< "$candidates"
          return 1
        }

        DEFAULT_BRANCH="$(gh api "repos/${GITHUB_REPOSITORY}" --jq ".default_branch")"
        if [[ -z "$TARGET_BRANCH" ]]; then
          TARGET_BRANCH="$DEFAULT_BRANCH"
        fi

        latest_release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" 2>/dev/null || true)"
        previous_tag=""
        latest_release_date=""

        if [[ -n "$latest_release_json" ]]; then
          previous_tag="$(jq -r ".tag_name // empty" <<< "$latest_release_json")"
          latest_release_date="$(jq -r ".published_at // .created_at // empty" <<< "$latest_release_json")"
        fi

        search_query="repo:${GITHUB_REPOSITORY} is:pr is:merged"
        if [[ -n "$latest_release_date" ]]; then
          latest_release_day="${latest_release_date%%T*}"
          search_query="$search_query merged:>$latest_release_day"
          echo "Latest release: $previous_tag ($latest_release_date)"
        else
          echo "No previous release found. Inspecting all merged pull requests."
        fi

        prs_file="$(mktemp)"
        gh api -X GET --paginate "search/issues" -f q="$search_query" \
          --jq '.items[] | {number, title, author: .user.login, closed_at, labels: [.labels[].name]}' \
          | jq -s '.' > "$prs_file"

        infer_version_level_from_labels() {
          local labels=""
          local major_labels minor_labels patch_labels

          labels="$(jq -r '.[].labels[]?' "$prs_file" | normalize_label | sed '/^$/d' || true)"

          if [[ -z "$labels" ]]; then
            echo "No merged PR labels found. Using default version level '$DEFAULT_VERSION_LEVEL'." >&2
            VERSION_LEVEL="$DEFAULT_VERSION_LEVEL"
            return
          fi

          major_labels="$(jq -r '.categories[] | select(.versionLevel == "major") | .labels[]' "$RELEASE_LABELS_CONFIG_PATH" | normalize_label | sed '/^$/d')"
          minor_labels="$(jq -r '.categories[] | select(.versionLevel == "minor") | .labels[]' "$RELEASE_LABELS_CONFIG_PATH" | normalize_label | sed '/^$/d')"
          patch_labels="$(jq -r '.categories[] | select(.versionLevel == "patch") | .labels[]' "$RELEASE_LABELS_CONFIG_PATH" | normalize_label | sed '/^$/d')"

          while IFS= read -r label; do
            if label_matches "$label" "$major_labels"; then
              VERSION_LEVEL="major"
              return
            fi
          done <<< "$labels"

          while IFS= read -r label; do
            if label_matches "$label" "$minor_labels"; then
              VERSION_LEVEL="minor"
              return
            fi
          done <<< "$labels"

          while IFS= read -r label; do
            if label_matches "$label" "$patch_labels"; then
              VERSION_LEVEL="patch"
              return
            fi
          done <<< "$labels"

          echo "No release labels matched. Using default version level '$DEFAULT_VERSION_LEVEL'." >&2
          VERSION_LEVEL="$DEFAULT_VERSION_LEVEL"
        }

        EXPLICIT_VERSION_LEVEL="$(echo "$EXPLICIT_VERSION_LEVEL" | normalize_label | tr -d "[:space:]")"

        if [[ -n "$EXPLICIT_VERSION_LEVEL" ]]; then
          VERSION_LEVEL="$EXPLICIT_VERSION_LEVEL"
          echo "Using explicit version level: $VERSION_LEVEL"
        else
          infer_version_level_from_labels
        fi

        case "$VERSION_LEVEL" in
          major|minor|patch)
            ;;
          *)
            echo "Unsupported version level '$VERSION_LEVEL'. Expected 'major', 'minor', or 'patch'." >&2
            exit 1
            ;;
        esac

        version_prefix=""
        base_version="0.0.0"

        if [[ -n "$previous_tag" ]]; then
          if [[ "$previous_tag" == v* ]]; then
            version_prefix="v"
            base_version="${previous_tag#v}"
          else
            base_version="$previous_tag"
          fi
        fi

        if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Latest release tag '$previous_tag' is not a simple semantic version." >&2
          exit 1
        fi

        IFS='.' read -r major minor patch <<< "$base_version"

        case "$VERSION_LEVEL" in
          major)
            major=$((major + 1))
            minor=0
            patch=0
            ;;
          minor)
            minor=$((minor + 1))
            patch=0
            ;;
          patch)
            patch=$((patch + 1))
            ;;
        esac

        next_version="${version_prefix}${major}.${minor}.${patch}"
        echo "Resolved version level: $VERSION_LEVEL"
        echo "Next version: $next_version"

        body_file="$(mktemp)"
        changes_file="$(mktemp)"
        categorized_changes_json_file="$(mktemp)"
        categorized_pr_numbers_file="$(mktemp)"
        raw_uncategorized_changes_file="$(mktemp)"
        uncategorized_changes_file="$(mktemp)"

        jq --slurpfile prs "$prs_file" '
          def norm: ascii_downcase | gsub("^\\s+|\\s+$"; "");
          def has_any_label($wanted):
            (.labels // [] | map(norm)) as $labels
            | any($wanted[]; . as $label | $labels | index($label));

          $prs[0] as $all_prs
          | [
              .categories[]
              | . as $category
              | ($category.labels | map(norm)) as $wanted
              | {
                  title: $category.title,
                  prs: ([$all_prs[] | select(has_any_label($wanted))] | unique_by(.number) | sort_by(.closed_at // ""))
                }
            ]
        ' "$RELEASE_LABELS_CONFIG_PATH" > "$categorized_changes_json_file"

        jq -r '
          .[]
          | select(.prs | length > 0)
          | "### " + .title,
            (.prs[] | "- " + .title + " @" + .author + " (#" + (.number | tostring) + ")"),
            ""
        ' "$categorized_changes_json_file" > "$changes_file"

        jq -r '.[].prs[].number' "$categorized_changes_json_file" > "$categorized_pr_numbers_file"

        if [[ -n "$previous_tag" ]]; then
          git log --format='%s' "$previous_tag..$TARGET_BRANCH" > "$raw_uncategorized_changes_file" || true
        else
          git log --format='%s' "$TARGET_BRANCH" > "$raw_uncategorized_changes_file" || true
        fi

        while IFS= read -r commit_subject; do
          matched_categorized_pr="false"

          while IFS= read -r pr_number; do
            if [[ -n "$pr_number" && ( "$commit_subject" =~ \(\#${pr_number}\) || "$commit_subject" =~ [Pp]ull\ request\ \#${pr_number} ) ]]; then
              matched_categorized_pr="true"
              break
            fi
          done < "$categorized_pr_numbers_file"

          if [[ "$matched_categorized_pr" == "false" ]]; then
            echo "- $commit_subject" >> "$uncategorized_changes_file"
          fi
        done < "$raw_uncategorized_changes_file"

        {
          echo "## Changes"
          echo
          if [[ -s "$changes_file" ]]; then
            cat "$changes_file"
          fi

          if [[ -s "$uncategorized_changes_file" ]]; then
            echo "### Uncategorized Changes"
            echo
            cat "$uncategorized_changes_file"
            echo
          fi

          if [[ ! -s "$changes_file" && ! -s "$uncategorized_changes_file" ]]; then
            echo "- No changes found."
            echo
          fi

          if [[ -n "$previous_tag" ]]; then
            echo "## 🕵️‍♀️ Full commit logs"
            echo
            echo "- https://github.com/$GITHUB_REPOSITORY/compare/$previous_tag...$next_version"
          fi
        } > "$body_file"

        draft="true"
        if [[ "$PUBLISH" == "true" ]]; then
          draft="false"
        fi

        draft_release_ids="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
          --jq ".[] | select(.draft == true) | .id" || true)"

        if [[ -n "$draft_release_ids" ]]; then
          while IFS= read -r draft_release_id; do
            if [[ -n "$draft_release_id" ]]; then
              echo "Deleting existing draft release $draft_release_id."
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${draft_release_id}" >/dev/null
            fi
          done <<< "$draft_release_ids"
        else
          echo "No existing draft releases to delete."
        fi

        payload_file="$(mktemp)"
        jq -n \
          --arg tag_name "$next_version" \
          --arg name "$next_version" \
          --arg target_commitish "$TARGET_BRANCH" \
          --rawfile body "$body_file" \
          --argjson draft "$draft" \
          '{
            tag_name: $tag_name,
            name: $name,
            target_commitish: $target_commitish,
            body: $body,
            draft: $draft,
            prerelease: false
          }' > "$payload_file"

        echo "Creating release for $next_version."
        gh api -X POST "repos/${GITHUB_REPOSITORY}/releases" --input "$payload_file" >/dev/null
