name: "Check PR Label"
description: "Validate that a pull request has at least one required label."
author: "OncoKB Team"
branding:
  icon: "check-circle"
  color: "blue"

runs:
  using: "composite"
  steps:
    - name: Validate required label
      shell: bash
      run: |
        set -euo pipefail

        RELEASE_LABELS_CONFIG_PATH="$GITHUB_ACTION_PATH/../create-release-action/release-labels.json"

        if [[ ! -f "$RELEASE_LABELS_CONFIG_PATH" ]]; then
          echo "Shared release labels config not found." >&2
          exit 1
        fi

        REQUIRED_LABELS="$(jq -r '.categories[].labels[]' "$RELEASE_LABELS_CONFIG_PATH" | tr "[:upper:]" "[:lower:]" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')"

        if [[ ! -f "$GITHUB_EVENT_PATH" ]]; then
          echo "GitHub event payload not found." >&2
          exit 1
        fi

        if [[ "$(jq -r 'has("pull_request")' "$GITHUB_EVENT_PATH")" != "true" ]]; then
          echo "Check PR Label must run on a pull_request event." >&2
          exit 1
        fi

        PR_LABELS="$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH")"

        echo "Labels:"
        if [[ -n "$PR_LABELS" ]]; then
          echo "$PR_LABELS"
        else
          echo "(none)"
        fi

        while IFS= read -r current_label; do
          current_label="$(echo "$current_label" | tr "[:upper:]" "[:lower:]" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          while IFS= read -r required_label; do
            if [[ "$current_label" == "$required_label" ]]; then
              echo "Required label found: $current_label"
              exit 0
            fi
          done <<< "$REQUIRED_LABELS"
        done <<< "$PR_LABELS"

        echo "PR must have one of:" >&2
        echo "$REQUIRED_LABELS" >&2
        exit 1
